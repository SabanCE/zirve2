<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kazanan Seçici</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Dağ Background -->
    <img id="dag-background" src="dag.png" alt="Dağ">

    <!-- Login Sayfası -->
    <div id="login-container" class="login-container">
        <div class="login-card">
            <div class="login-logos">
                <img src="logo.jpg" alt="Logo 1" class="login-logo">
                <img src="images.jfif" alt="Logo 2" class="login-logo">
            </div>
            <h1 class="login-title">EGZ-26 ÇEKİLİŞ</h1>
            <p class="login-subtitle">Sisteme girmek için token giriniz</p>
            <form id="login-form" class="login-form">
                <input 
                    type="password" 
                    id="token-input" 
                    class="login-input" 
                    placeholder="Token gir..." 
                    autocomplete="off"
                >
                <button type="submit" class="btn btn-primary login-btn">
                    Giriş Yap
                </button>
            </form>
            <p id="login-error" class="login-error hidden"></p>
        </div>
    </div>

    <!-- Ana Sayfa -->
    <div id="main-container" class="container hidden">
        <div class="event-tagline">Bir Zirve, 5 Farklı Bakış</div>
        
        <div class="card">
            <div class="logo-section">
                <img src="logo.jpg" alt="Logo" class="logo">
                <img src="images.jfif" alt="Logo" class="logo">
            </div>
            
            <h1>🎉 EGZ-26 ÇEKİLİŞİ</h1>
            
            <div class="section">
                <h2>Katılımcılar</h2>
                <div id="names-list" class="names-list">
                    <p class="loading">Yükleniyor...</p>
                </div>
            </div>

            <div class="section">
                <button id="select-btn" class="btn btn-primary">
                    <span class="btn-text">Kazananı Seç</span>
                    <span class="btn-emoji">🎲</span>
                </button>
            </div>

            <div id="winner-section" class="winner-section hidden">
                <h2>🏆 Kazanan:</h2>
                <div class="winner-box">
                    <p id="winner-name" class="winner-name">-</p>
                </div>
                <button id="reset-btn" class="btn btn-secondary">
                    Yeni Çekiliş
                </button>
            </div>

            <div id="error-message" class="error hidden"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
